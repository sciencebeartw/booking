    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:9999;padding:10px;font-size:14px;font-weight:bold;';
            errDiv.innerText = `[Error] ${message} at ${source}:${lineno}:${colno}`;
            document.body.appendChild(errDiv);
        };
        window.addEventListener('unhandledrejection', function (event) {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:45px;left:0;right:0;background:orange;color:white;z-index:9999;padding:10px;font-size:14px;font-weight:bold;';
            errDiv.innerText = `[Promise Rejection] ${event.reason}`;
            document.body.appendChild(errDiv);
        });
    </script>

        <script type="module">
            import { db, ref, auth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, get, child, ref as dbRef, onAuthStateChanged } from './firebase-config.js?v=202603061922';
            import { onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

            // Firebase modules imported successfully

            // ★★★ 核心時間校準監聽 ★★★
            let serverTimeOffset = 0;
            onValue(ref(db, ".info/serverTimeOffset"), (snap) => {
                serverTimeOffset = snap.val() || 0;
            });

            window.currentAppMode = null; // 'regular' or 'trial'

            window.selectAppMode = function (mode) {
                window.currentAppMode = mode;

                // ★★★ 新增：讓網址列靜默更新，加入 ?mode 參數，這樣重整就不會迷路 ★★★
                window.history.replaceState(null, '', '?mode=' + mode);
                document.getElementById('navSopLink').href = 'sop.html?mode=' + mode;
                document.getElementById('navCheckLink').href = 'check.html?mode=' + mode;

                document.getElementById('entrySelection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';

                loadBanners();
                processCombinedData();
            };

            window.checkResetMode = function () {
                document.getElementById('entrySelection').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
                window.currentAppMode = null;
            };

            const track = document.getElementById('track');
            const nav = document.getElementById('nav');
            let currentSlide = 0;
            let slideCount = 0;

            // ★★★ 防閃爍優化：橫幅快照紀錄 ★★★
            let currentBannersStr = "";
            let currentBannerListener = null;
            let bannerIntervalId = null;
            let bannerIntervalMs = 5000;
            let isHoveringCarousel = false;

            // 讀取後台設定的輪播秒數
            onValue(ref(db, 'settings/bannerInterval'), (snapshot) => {
                bannerIntervalMs = snapshot.val() || 5000;
                resetBannerInterval();
            });

            const carouselContainer = document.querySelector('.carousel');

            // 實作 Hover 暫停
            carouselContainer.addEventListener('mouseenter', () => {
                isHoveringCarousel = true;
                clearInterval(bannerIntervalId);
            });
            carouselContainer.addEventListener('mouseleave', () => {
                isHoveringCarousel = false;
                resetBannerInterval();
            });

            function resetBannerInterval() {
                clearInterval(bannerIntervalId);
                if (slideCount > 1 && !isHoveringCarousel) {
                    bannerIntervalId = setInterval(() => {
                        currentSlide = (currentSlide + 1) % slideCount;
                        goToSlide(currentSlide);
                    }, bannerIntervalMs);
                }
            }

            function loadBanners() {
                if (currentBannerListener) {
                    currentBannerListener(); // 正確解除佔用的 Listener
                    currentBannersStr = "";
                }
                const targetNode = window.currentAppMode === 'trial' ? 'trial_banners' : 'banners';
                const bannerRef = ref(db, targetNode);

                currentBannerListener = onValue(bannerRef, snapshot => {
                    const data = snapshot.val() || {};
                    const newBannersStr = JSON.stringify(data);

                    if (currentBannersStr === newBannersStr) return;
                    currentBannersStr = newBannersStr;

                    track.innerHTML = "";
                    nav.innerHTML = "";
                    const banners = Object.values(data);
                    slideCount = banners.length;
                    if (slideCount === 0) {
                        track.innerHTML = '<div class="carousel-slide" style="background-image: url(\'https://via.placeholder.com/1200x400?text=Welcome\');"></div>';
                        return;
                    }
                    banners.forEach((b, index) => {
                        const slide = document.createElement('div');
                        slide.className = 'carousel-slide';
                        slide.style.backgroundImage = `url('${b.url}')`;
                        track.appendChild(slide);
                        const dot = document.createElement('div');
                        dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
                        dot.onclick = () => goToSlide(index);
                        nav.appendChild(dot);
                    });

                    resetBannerInterval();
                });
            }

            function goToSlide(index) {
                currentSlide = index;
                track.style.transform = `translateX(-${index * 100}%)`;
                document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }

            const courseContainer = document.getElementById('courseContainer');
            const filterContainer = document.getElementById('filterContainer');
            let allCourses = [];
            let seatsStatus = {};
            let waitlistStatus = {};
            let categories = new Set();
            let currentCategory = 'all';
            let isFirstLoad = true;

            // ★★★ 判斷是否為「今天」 (導入伺服器時間校準) ★★★
            function isToday(timestamp) {
                const d = new Date(timestamp);
                const today = new Date(Date.now() + serverTimeOffset);
                return d.getDate() === today.getDate() &&
                    d.getMonth() === today.getMonth() &&
                    d.getFullYear() === today.getFullYear();
            }

            // ★★★ 判斷是否為「未來的一天」 (導入伺服器時間校準) ★★★
            function isFutureDay(timestamp) {
                const d = new Date(timestamp);
                const today = new Date(Date.now() + serverTimeOffset);
                d.setHours(0, 0, 0, 0);
                today.setHours(0, 0, 0, 0);
                return d.getTime() > today.getTime();
            }

            let rawCourses = {};
            let rawTrialEvents = {};

            function processCombinedData() {
                // if mode is not selected yet, hold off
                if (!window.currentAppMode) return;

                allCourses = [];
                categories = new Set();
                let hasTodayCourses = false;
                let hasUpcomingCourses = false;

                const processItem = (c, key, isTrialEvent) => {
                    // Filter based on selected mode
                    if (window.currentAppMode === 'trial' && !isTrialEvent) return;
                    if (window.currentAppMode === 'regular' && isTrialEvent) return;

                    c.id = key;
                    if (isTrialEvent) {
                        c.grade = "✨ 試聽活動";
                        c.isTrialEvent = true;
                        // mapping trial event fields to common card fields
                        c.subject = c.title || '試聽活動';
                        c.image = c.coverImage || 'https://via.placeholder.com/400x200?text=No+Image';
                        c.start1 = c.openTime;
                        c.teacher = c.teacher || '-';
                        c.price = ''; // 試聽不顯示價錢
                        c.timeDescription = '預約專區'; // Display fixed text as trial time is session-based now
                        // disable status badges logic for ended trials
                        if (c.status === 'closed') {
                            c.forceClosed = true;
                        }
                    }
                    allCourses.push(c);
                    if (c.grade) categories.add(c.grade);

                    if (c.start1) {
                        const start1Time = new Date(c.start1).getTime();
                        if (isToday(start1Time)) {
                            hasTodayCourses = true;
                        } else if (isFutureDay(start1Time)) {
                            hasUpcomingCourses = true;
                        }
                    }
                };

                if (rawCourses) {
                    Object.keys(rawCourses).forEach(key => {
                        processItem(rawCourses[key], key, false);
                    });
                }

                if (rawTrialEvents) {
                    Object.keys(rawTrialEvents).forEach(key => {
                        processItem(rawTrialEvents[key], key, true);
                    });
                }

                // ★★★ 依後台設定的 sortOrder 排序 ★★★
                allCourses.sort((a, b) => {
                    const orderA = a.sortOrder !== undefined ? a.sortOrder : 999999;
                    const orderB = b.sortOrder !== undefined ? b.sortOrder : 999999;
                    return orderA - orderB;
                });

                if (allCourses.length === 0) {
                    courseContainer.innerHTML = '<div class="loading">目前沒有開放的課程。</div>';
                    return;
                }

                filterContainer.innerHTML = '';

                if (window.currentAppMode !== 'trial') {
                    filterContainer.innerHTML = '<button class="filter-btn" id="btn-all" onclick="filterCourses(\'all\')">全部課程</button>';
                } else {
                    const btnTrial = document.createElement('button');
                    btnTrial.className = 'filter-btn';
                    btnTrial.style.color = '#8e44ad';
                    btnTrial.style.borderColor = '#8e44ad';
                    btnTrial.style.fontWeight = 'bold';
                    btnTrial.style.background = '#f4ecf7';
                    btnTrial.textContent = '✨ 試聽活動';
                    btnTrial.onclick = () => window.filterCourses('✨ 試聽活動');
                    filterContainer.appendChild(btnTrial);
                }

                if (hasTodayCourses) {
                    const btnToday = document.createElement('button');
                    btnToday.className = 'filter-btn special-today';
                    btnToday.textContent = window.currentAppMode === 'trial' ? '🔥 今日報名' : '🔥 今日劃位';
                    btnToday.onclick = () => window.filterCourses('today');
                    filterContainer.appendChild(btnToday);
                } else if (hasUpcomingCourses) {
                    const btnUpcoming = document.createElement('button');
                    btnUpcoming.className = 'filter-btn special-upcoming';
                    btnUpcoming.textContent = window.currentAppMode === 'trial' ? '⏳ 最近報名' : '⏳ 最近劃位';
                    btnUpcoming.onclick = () => window.filterCourses('upcoming');
                    filterContainer.appendChild(btnUpcoming);
                }

                const gradeOrder = ["✨ 試聽活動", "升小五課程", "升小六課程", "升國一課程", "升國二課程", "升國三課程", "升高一課程", "升高二課程", "升高三課程"];
                const sortedCategories = Array.from(categories).sort((a, b) => gradeOrder.indexOf(a) - gradeOrder.indexOf(b));

                sortedCategories.forEach(cat => {
                    if (window.currentAppMode === 'trial' && cat === '✨ 試聽活動') return;

                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    if (cat === "✨ 試聽活動") {
                        btn.style.color = '#8e44ad';
                        btn.style.borderColor = '#8e44ad';
                        btn.style.fontWeight = 'bold';
                        btn.style.background = '#f4ecf7';
                    }
                    btn.textContent = cat;
                    btn.onclick = () => window.filterCourses(cat);
                    filterContainer.appendChild(btn);
                });

                if (isFirstLoad) {
                    if (hasTodayCourses) {
                        currentCategory = 'today';
                    } else if (hasUpcomingCourses) {
                        currentCategory = 'upcoming';
                    } else {
                        currentCategory = window.currentAppMode === 'trial' ? '✨ 試聽活動' : 'all';
                    }
                    isFirstLoad = false;
                }

                window.filterCourses(currentCategory);
            }

            onValue(ref(db, 'courses'), (snapshot) => {
                rawCourses = snapshot.val() || {};
                processCombinedData();
            });

            onValue(ref(db, 'trial_events_config'), (snapshot) => {
                rawTrialEvents = snapshot.val() || {};
                processCombinedData();
            });


            let allSeatsData = {};
            onValue(ref(db, 'seats'), (snapshot) => {
                allSeatsData = snapshot.val() || {};
                refreshDisplay();
            });

            onValue(ref(db, 'waitlist'), (snapshot) => {
                const data = snapshot.val() || {};
                waitlistStatus = {};
                Object.keys(data).forEach(courseId => {
                    let count = 0;
                    Object.values(data[courseId]).forEach(w => {
                        if (w.status !== 'deleted') count++;
                    });
                    waitlistStatus[courseId] = count;
                });
                refreshDisplay();
            });

            function refreshDisplay() {
                if (allCourses.length === 0) return;

                // ★★★ 導入伺服器時間校準 ★★★
                const now = Date.now() + serverTimeOffset;

                const visibleCourses = allCourses.filter(c => {
                    const start = c.displayStart ? new Date(c.displayStart).getTime() : 0;
                    const end = c.displayEnd ? new Date(c.displayEnd).getTime() : 9999999999999;
                    return now >= start && now <= end;
                });

                let finalCourses = visibleCourses;

                if (currentCategory === 'today') {
                    finalCourses = visibleCourses.filter(c => c.start1 && isToday(new Date(c.start1).getTime()));
                } else if (currentCategory === 'upcoming') {
                    finalCourses = visibleCourses.filter(c => c.start1 && isFutureDay(new Date(c.start1).getTime()));
                } else if (currentCategory !== 'all') {
                    finalCourses = visibleCourses.filter(c => c.grade === currentCategory);
                }

                renderCourses(finalCourses);
            }

            setInterval(refreshDisplay, 1000);

            function getStatusBadge(c, now) {
                // =============== 試聽活動邏輯 ===============
                if (c.isTrialEvent) {
                    const start1 = new Date(c.start1).getTime();
                    const effectiveStart1 = start1 - (parseInt(c.earlyAccessSec) || 0) * 1000;
                    const end1 = c.closeTime ? new Date(c.closeTime).getTime() : 9999999999999;

                    let isWaitlistOnlyFull = false;
                    let isFull = false;

                    const soldCount = (allSeatsData[c.id] && Object.values(allSeatsData[c.id]).filter(s => s.status === 'sold').length) || 0;
                    if (soldCount >= (c.totalSeats || 999)) isFull = true;

                    if (c.type === 'waitlist_only' && c.sessions) {
                        let allSessionsFull = true;
                        let hasAnySession = false;
                        for (let key in c.sessions) {
                            hasAnySession = true;
                            const s = c.sessions[key];
                            const cap = s.capacity || 0;
                            const curCount = s.currentWaitlistCount || 0;
                            if (curCount < cap) {
                                allSessionsFull = false;
                                break;
                            }
                        }
                        if (hasAnySession && allSessionsFull) !!(isFull = true);
                    }

                    const waitlistCount = waitlistStatus[c.id] || 0;
                    const isWaitlistFull = (c.waitlistLimit > 0 && waitlistCount >= c.waitlistLimit);

                    if (c.forceClosed || now >= end1) return '<div class="status-badge status-full">🔴 報名已結束</div>';
                    if (now < effectiveStart1) return '<div class="status-badge status-closed">尚未開放</div>';

                    if (now >= effectiveStart1 && now < end1) {
                        if (isFull) {
                            if (c.waitlistEnabled) {
                                return isWaitlistFull ? '<div class="status-badge status-full">🔴 候補已額滿</div>' : '<div class="status-badge status-wait">🟡 開放候補中</div>';
                            }
                            return '<div class="status-badge status-full">🔴 此階段已額滿</div>';
                        }
                        return now < start1 ? '<div class="status-badge status-open">🟢 即將開放</div>' : '<div class="status-badge status-open">🟢 開放報名中</div>';
                    }
                    return '<div class="status-badge status-closed">尚未開放</div>';
                }

                // =============== 常規課程 (支援跨梯次) ===============
                if (c.forceClosed) return '<div class="status-badge status-full">🔴 劃位已結束</div>';

                const waitlistCount = waitlistStatus[c.id] || 0;
                const isWaitlistFull = (c.waitlistLimit > 0 && waitlistCount >= c.waitlistLimit);

                // ✅ 使用 seats/_settings 的數字時間戳記（與 booking.html 完全一致）
                const seatSettings = (allSeatsData[c.id] && allSeatsData[c.id]['_settings']) || {};
                const pStr = (t) => t ? new Date(t).getTime() : 9999999999999;
                const p1s1 = seatSettings.start1 || pStr(c.start1);
                const p1e1 = seatSettings.end1 || pStr(c.end1);
                const p1s2 = seatSettings.start2 || pStr(c.start2);
                const p1e2 = seatSettings.end2 || pStr(c.end2);
                const p2s1 = seatSettings.t2_start1 || pStr(c.t2_start1);
                const p2e1 = seatSettings.t2_end1 || pStr(c.t2_end1);
                const p2s2 = seatSettings.t2_start2 || pStr(c.t2_start2);
                const p2e2 = seatSettings.t2_end2 || pStr(c.t2_end2);
                const p3s1 = seatSettings.t3_start1 || pStr(c.t3_start1);
                const p3e1 = seatSettings.t3_end1 || pStr(c.t3_end1);
                const p3s2 = seatSettings.t3_start2 || pStr(c.t3_start2);
                const p3e2 = seatSettings.t3_end2 || pStr(c.t3_end2);
                const phases = [
                    { s1: p1s1, e1: p1e1, s2: p1s2, e2: p1e2 },
                    { s1: p2s1, e1: p2e1, s2: p2s2, e2: p2e2 },
                    { s1: p3s1, e1: p3e1, s2: p3s2, e2: p3e2 }
                ];

                let finalEndTime = 0;
                let activePhaseIdx = -1;
                let activeStage = 0;
                let isPreparing = false;
                let isFinalConfiguredStage = false;

                // 尋找出「最後一個有設定的階段」以判斷是否該出現候補按鈕
                let lastPhaseIdx = -1;
                let lastStageNum = 1;
                for (let i = 0; i < phases.length; i++) {
                    if (phases[i].s1 && phases[i].s1 < 9999999999999) {
                        lastPhaseIdx = i;
                        lastStageNum = (phases[i].s2 && phases[i].s2 < 9999999999999) ? 2 : 1;
                    }
                }

                // 判斷目前狀態
                for (let i = 0; i < phases.length; i++) {
                    const p = phases[i];
                    if (!p.s1 || p.s1 >= 9999999999999) continue;

                    const s1 = p.s1;
                    const e1 = p.e1 || 9999999999999;
                    const s2 = p.s2 || 9999999999999;
                    const e2 = p.e2 || 9999999999999;
                    const hasS2 = s2 < 9999999999999;

                    finalEndTime = Math.max(finalEndTime, hasS2 ? e2 : e1);

                    if (now >= s1 && now < e1) {
                        activePhaseIdx = i;
                        activeStage = 1;
                        if (i === lastPhaseIdx && lastStageNum === 1) isFinalConfiguredStage = true;
                    } else if (hasS2 && now >= s2 && now < e2) {
                        activePhaseIdx = i;
                        activeStage = 2;
                        if (i === lastPhaseIdx && lastStageNum === 2) isFinalConfiguredStage = true;
                    } else if (hasS2 && now >= e1 && now < s2) {
                        isPreparing = true; // 階段一結束但階段二還沒開始
                    }
                }

                if (now < phases[0].s1) return '<div class="status-badge status-closed">尚未開放</div>';
                if (finalEndTime > 0 && now >= finalEndTime) return '<div class="status-badge status-full">🔴 劃位已結束</div>';

                if (activePhaseIdx === -1) {
                    if (isPreparing) return '<div class="status-badge status-closed">⛔ 座位整理中</div>';
                    // 不在上述期間，但也不是第一梯次開始前，也不是最後結束後 (也就是在梯次之間的空白期間)
                    return '<div class="status-badge status-closed">⛔ 未開放</div>';
                }

                // 計算座位數
                let isP1 = true; let isP2 = false; let isP3 = false;
                if (p3s1 < 9999999999999 && now >= p3s1) { isP3 = true; isP1 = false; }
                else if (p2s1 < 9999999999999 && now >= p2s1) { isP2 = true; isP1 = false; }

                let soldCount = 0;
                let currentPhaseLockedCount = 0;
                const seatsInfo = allSeatsData[c.id] || {};

                Object.keys(seatsInfo).forEach(seatId => {
                    if (seatId === '_settings') return;
                    const info = seatsInfo[seatId];
                    if (info.status === 'sold') {
                        soldCount++;
                    } else if (info.status === 'locked') {
                        if (info.user === 'admin_reserved') {
                            currentPhaseLockedCount++;
                        } else if (info.user === 'admin_phase2') {
                            if (isP1) currentPhaseLockedCount++;
                        } else if (info.user === 'admin_phase3') {
                            if (isP1 || isP2) currentPhaseLockedCount++;
                        }
                    }
                });

                const effectiveSoldCount = soldCount + currentPhaseLockedCount;
                let isFull = effectiveSoldCount >= (c.totalSeats || 999);

                if (isFull) {
                    if (isFinalConfiguredStage && c.waitlistEnabled) {
                        return isWaitlistFull ? '<div class="status-badge status-full">🔴 候補已額滿</div>' : '<div class="status-badge status-wait">🟡 開放候補中</div>';
                    }
                    return '<div class="status-badge status-full">🔴 此階段已額滿</div>';
                }

                return '<div class="status-badge status-open">🟢 開放劃位中</div>';
            }

            function renderCourses(courses) {
                if (courses.length === 0) {
                    courseContainer.innerHTML = '<div class="loading">目前沒有符合的課程。</div>';
                    return;
                }

                const currentIds = new Set(courses.map(c => `card-${c.id}`));
                Array.from(courseContainer.children).forEach(child => {
                    if (child.id && !currentIds.has(child.id) && !child.classList.contains('loading')) {
                        courseContainer.removeChild(child);
                    }
                });

                const loadingEl = courseContainer.querySelector('.loading');
                if (loadingEl) courseContainer.removeChild(loadingEl);

                // 這裡的 now 會是由 refreshDisplay 傳進來的伺服器時間，非常精準！
                const now = Date.now() + serverTimeOffset;

                courses.forEach(c => {
                    const statusBadge = getStatusBadge(c, now);
                    const cardId = `card-${c.id}`;
                    let card = document.getElementById(cardId);

                    if (card) {
                        const badgeContainer = card.querySelector('.status-badge-container');
                        if (badgeContainer.innerHTML !== statusBadge) {
                            badgeContainer.innerHTML = statusBadge;
                        }
                    } else {
                        card = document.createElement('a');
                        card.className = 'course-card';
                        card.id = cardId;
                        if (c.isTrialEvent) {
                            card.href = `detail.html?eventId=${c.id}`;
                        } else {
                            card.href = `detail.html?id=${c.id}`;
                        }

                        card.innerHTML = `
                        <div class="card-img" style="background-image: url('${c.image || 'https://via.placeholder.com/400x200'}');"></div>
                        <div class="card-body">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                                <div class="card-category">${c.grade}</div>
                                <div class="status-badge-container">${statusBadge}</div>
                            </div>
                            <div class="card-title">${c.subject} ${c.classType || ''}</div>
                            <div class="card-info">
                                👨‍🏫 ${c.teacher}<br>
                                ⏰ ${c.timeDescription || '時間未定'}
                            </div>
                            <div class="card-footer">
                                <div class="card-price">${c.price}</div>
                                <div class="btn-view">查看詳情 ➜</div>
                            </div>
                        </div>
                    `;
                        courseContainer.appendChild(card);
                    }
                });
            }

            window.filterCourses = function (category, noRefresh = false) {
                currentCategory = category;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    if (btn.textContent === category ||
                        (category === 'all' && btn.textContent === '全部課程') ||
                        (category === 'today' && (btn.textContent === '🔥 今日劃位' || btn.textContent === '🔥 今日報名')) ||
                        (category === 'upcoming' && (btn.textContent === '⏳ 最近劃位' || btn.textContent === '⏳ 最近報名'))) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                if (!noRefresh) refreshDisplay();
            };

            // ★★★ 關鍵：頁面初始化時預先載入 signInWithPopup & signOut，
            //   這樣點擊登入按鈕時可以直接同步呼叫，不需要 await import()。
            //   任何在點擊事件中的 await 都會打斷「使用者手勢鏈」，導致 popup 被封鎖。
            let _signInWithPopup = null;
            let _signOut = null;
            import('./firebase-config.js').then(mod => {
                _signInWithPopup = mod.signInWithPopup;
                _signOut = mod.signOut;
            });

            const checkAdminRedirect = async (user) => {
                try {
                    // ★ 防護：如果是匿名帳號或沒信箱，直接阻斷
                    const safeEmail = (user.email || '').replace(/\./g, ',');
                    const snapshot = await get(child(dbRef(db), `admins/${safeEmail}`));
                    if (snapshot.exists()) {
                        window.location.href = "admin_bear2026.html";
                    } else {
                        const errMsg = "權限不足！此帳號（" + user.email + "）非系統管理員。";
                        if (typeof Swal !== 'undefined') Swal.fire(errMsg);
                        else alert(errMsg);
                        if (_signOut) await _signOut(auth);
                    }
                } catch (error) {
                    console.error("驗證管理員身分失敗:", error);
                }
            };

            // ★★★ 管理員 Google 登入 ★★★
            window.loginAdminWithGoogle = function () {
                // ★ 核心修正：必須確認「有登入」且「不是匿名訪客」
                if (auth.currentUser && !auth.currentUser.isAnonymous) {
                    checkAdminRedirect(auth.currentUser);
                    return;
                }

                // ★★★ 關鍵：signInWithPopup 必須在同步的點擊事件函數內直接呼叫，
                //   任何 await（包含 await import()）都會打斷「使用者手勢鏈」，
                //   導致瀏覽器封鎖彈出視窗（popup-blocked）。
                //   _signInWithPopup 已在頁面初始化時預先載入完畢。
                if (!_signInWithPopup) {
                    alert('系統尚未初始化完成，請稍後再試！');
                    return;
                }

                const provider = new GoogleAuthProvider();

                _signInWithPopup(auth, provider).then(signResult => {
                    if (signResult && signResult.user) {
                        return checkAdminRedirect(signResult.user);
                    }
                }).catch(error => {
                    console.error("登入失敗:", error);
                    let errorMsg = "登入發生錯誤：" + error.message;
                    if (error.code === 'auth/popup-blocked' || error.message.includes('popup')) {
                        errorMsg = "⚠️ 瀏覽器依然封鎖了登入視窗！\n請務必關閉 AdBlock，或在網址列設定為「一律允許彈出式視窗」。";
                    } else if (error.code === 'auth/popup-closed-by-user') {
                        errorMsg = "您已取消登入。";
                    } else if (error.code === 'auth/unauthorized-domain') {
                        errorMsg = "⚠️ 登入失敗：網域未被授權。";
                    }

                    if (typeof Swal !== 'undefined') {
                        Swal.fire("登入取消或失敗", errorMsg, "warning");
                    } else {
                        alert("登入取消或失敗\n\n" + errorMsg);
                    }
                });
            };

            // ★★★ Check URL ?mode= Parameter to auto enter mode ★★★
            const urlParams = new URLSearchParams(window.location.search);
            const initialMode = urlParams.get('mode');
            if (initialMode === 'trial' || initialMode === 'regular') {
                window.selectAppMode(initialMode);
            }
        </script>
