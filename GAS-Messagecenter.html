<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: #f4f4f9;
            padding: 20px;
            color: #333;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 20px;
            height: 620px;
        }

        .left-panel {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .year-setting {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .year-setting label {
            font-weight: bold;
            color: #f57f17;
            font-size: 14px;
        }

        .year-setting input {
            width: 70px;
            padding: 5px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .group-filter {
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .student-list {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
        }

        .student-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .student-item:hover {
            background: #f8fbff;
        }

        .student-item input {
            margin-right: 10px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .tag {
            font-size: 11px;
            background: #e0e0e0;
            padding: 3px 6px;
            border-radius: 10px;
            margin-left: auto;
            color: #555;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .right-panel {
            flex: 1.2;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            resize: none;
            margin-bottom: 10px;
            box-sizing: border-box;
            line-height: 1.5;
        }

        .image-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
            background: #f8fbff;
            padding: 10px;
            border: 1px dashed #1a73e8;
            border-radius: 4px;
        }

        .image-label {
            font-size: 13px;
            font-weight: bold;
            color: #1a73e8;
            display: flex;
            align-items: center;
        }

        .image-input {
            font-size: 13px;
            margin-left: 10px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: space-between;
            align-items: center;
        }

        .btn-var {
            background: #fff2cc;
            border: 1px solid #f6b26b;
            color: #b45f06;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-var:hover {
            background: #fce5cd;
        }

        .btn-send {
            background: #1a73e8;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: auto;
        }

        .btn-send:hover {
            background: #1557b0;
        }

        .btn-send:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            font-weight: bold;
            color: #d32f2f;
        }

        h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            font-size: 16px;
        }

        .select-all-box {
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .select-all-box input {
            margin-right: 10px;
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="left-panel">
            <h3>👥 1. 選擇收件群組</h3>

            <div class="year-setting">
                <label>掃描學年度：</label>
                <input type="number" id="yearInput" onchange="loadStudents()">
            </div>

            <div class="group-filter">
                <select id="groupSelect" onchange="filterStudents()">
                    <option value="ALL">顯示全部已綁定學生</option>
                </select>
            </div>

            <div class="select-all-box">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                <label for="selectAll" style="cursor:pointer;">全選目前名單 (<span id="countText">0</span>人)</label>
            </div>

            <div class="student-list" id="studentList">
                <div style="text-align:center; margin-top:50px; color:#999;">名單掃描載入中...</div>
            </div>
        </div>

        <div class="right-panel">
            <h3>💬 2. 編輯訊息內容</h3>

            <select id="templateSelect" onchange="applyTemplate()" style="background:#e8f0fe;">
                <option value="">📂 載入快捷訊息範本...</option>
            </select>

            <div class="toolbar">
                <button class="btn-var" onclick="insertVariable()">➕ 插入【學生姓名】</button>
            </div>
            <textarea id="messageText" placeholder="請在此輸入要發送的文字...\n\n(若只需傳圖片，文字可留空喔！🐻‍❄️)"></textarea>

            <div class="image-group">
                <div style="font-size:12px; color:#555; margin-bottom:5px;">🖼️ <b>直接從電腦上傳圖片 (最多 4 張，支援 JPG/PNG)</b>
                </div>
                <label class="image-label">圖片 1：<input type="file" id="imgFile1" class="image-input"
                        accept="image/jpeg, image/png"></label>
                <label class="image-label">圖片 2：<input type="file" id="imgFile2" class="image-input"
                        accept="image/jpeg, image/png"></label>
                <label class="image-label">圖片 3：<input type="file" id="imgFile3" class="image-input"
                        accept="image/jpeg, image/png"></label>
                <label class="image-label">圖片 4：<input type="file" id="imgFile4" class="image-input"
                        accept="image/jpeg, image/png"></label>
            </div>

            <button class="btn-send" id="sendBtn" onclick="confirmSend()">🚀 立即發送給選定的家長</button>
            <div class="status" id="statusText"></div>
        </div>
    </div>

    <script>
        let allStudents = [];
        let uniqueTags = new Set();
        let templatesData = [];

        window.onload = function () {
            const now = new Date();
            let rocYear = now.getFullYear() - 1911;
            if (now.getMonth() + 1 < 7) { rocYear = rocYear - 1; }
            document.getElementById('yearInput').value = rocYear;

            loadStudents();

            google.script.run.withSuccessHandler(function (data) {
                templatesData = data;
                const select = document.getElementById('templateSelect');
                select.innerHTML = '<option value="">📂 選擇快捷訊息範本 (可至試算表新增)</option>';
                data.forEach((tpl, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.text = `📝 ${tpl.title}`;
                    select.appendChild(opt);
                });
            }).getLineTemplates();
        };

        function loadStudents() {
            const year = document.getElementById('yearInput').value;
            if (!year) return;

            document.getElementById('studentList').innerHTML = '<div style="text-align:center; margin-top:50px; color:#999;">🔍 正在掃描 ' + year + ' 學年度名單與課程...</div>';

            google.script.run.withSuccessHandler(function (data) {
                allStudents = data;
                uniqueTags = new Set();
                data.forEach(s => { if (s.tags) { s.tags.forEach(t => uniqueTags.add(t)); } });

                populateGroupSelect();
                filterStudents();
            }).getLineBoundStudents(year);
        }

        function populateGroupSelect() {
            const select = document.getElementById('groupSelect');
            select.innerHTML = '<option value="ALL">顯示全部已綁定學生</option>';
            const sortedTags = Array.from(uniqueTags).sort();
            sortedTags.forEach(tag => {
                const opt = document.createElement('option');
                opt.value = tag;
                opt.text = tag.includes('總名單') ? `📍 ${tag}` : `📘 ${tag}`;
                select.appendChild(opt);
            });
        }

        function filterStudents() {
            const group = document.getElementById('groupSelect').value;
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = '';

            const filtered = group === 'ALL' ? allStudents : allStudents.filter(s => s.tags && s.tags.includes(group));
            document.getElementById('countText').innerText = filtered.length;

            if (filtered.length === 0) {
                listDiv.innerHTML = '<div style="text-align:center; margin-top:20px; color:#999;">此群組目前尚無綁定 LINE 的學生</div>';
                return;
            }

            filtered.forEach((s) => {
                let displayTags = s.tags.filter(t => !t.includes('總名單')).join(', ');
                if (!displayTags) displayTags = s.tags[0];

                listDiv.innerHTML += `
                  <label class="student-item">
                    <input type="checkbox" class="student-chk" value="${s.lineId}" data-name="${s.name}">
                    <span>${s.name}</span>
                    <span class="tag" title="${displayTags}">${displayTags}</span>
                  </label>
                `;
            });
            document.getElementById('selectAll').checked = false;
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('selectAll').checked;
            const checkboxes = document.querySelectorAll('.student-chk');
            checkboxes.forEach(chk => chk.checked = isChecked);
        }

        function applyTemplate() {
            const idx = document.getElementById('templateSelect').value;
            if (idx !== "") {
                document.getElementById('messageText').value = templatesData[idx].content;
            }
        }

        function insertVariable() {
            const textarea = document.getElementById('messageText');
            const startPos = textarea.selectionStart;
            const endPos = textarea.selectionEnd;
            const textToInsert = "{學生姓名}";
            textarea.value = textarea.value.substring(0, startPos) + textToInsert + textarea.value.substring(endPos, textarea.value.length);
            textarea.focus();
            textarea.selectionStart = startPos + textToInsert.length;
            textarea.selectionEnd = startPos + textToInsert.length;
        }

        // 把圖片轉成 Base64 的小幫手
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve({ name: file.name, data: reader.result });
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        async function confirmSend() {
            const checkboxes = document.querySelectorAll('.student-chk:checked');
            const rawText = document.getElementById('messageText').value.trim();

            // 抓出有選擇檔案的 input
            const fileInputs = [
                document.getElementById('imgFile1').files[0],
                document.getElementById('imgFile2').files[0],
                document.getElementById('imgFile3').files[0],
                document.getElementById('imgFile4').files[0]
            ].filter(f => f !== undefined);

            if (checkboxes.length === 0) { alert("請至少勾選一位收件人！"); return; }
            if (rawText === "" && fileInputs.length === 0) { alert("請輸入訊息內容或選擇圖片！"); return; }

            if (!confirm(`確定要發送給這 ${checkboxes.length} 位家長嗎？`)) return;

            const btn = document.getElementById('sendBtn');
            const statusText = document.getElementById('statusText');

            btn.disabled = true;
            btn.innerText = "⏳ 正在處理圖片並發送，請勿關閉視窗...";
            statusText.style.color = "#1a73e8";
            statusText.innerText = `準備發送 ${checkboxes.length} 則訊息...`;

            try {
                // 將使用者選的照片全部轉成 Base64
                const imagesData = [];
                for (let file of fileInputs) {
                    const b64 = await getBase64(file);
                    imagesData.push(b64);
                }

                const payload = [];
                checkboxes.forEach(chk => {
                    const studentName = chk.getAttribute('data-name');
                    const customizedText = rawText.replace(/{學生姓名}/g, studentName);
                    payload.push({ lineId: chk.value, text: customizedText });
                });

                // 將資料傳給後端
                google.script.run
                    .withSuccessHandler(function (result) {
                        btn.disabled = false;
                        btn.innerText = "🚀 立即發送給選定的家長";
                        statusText.style.color = "green";
                        statusText.innerText = `✅ 發送完畢！成功: ${result.success} 筆，失敗: ${result.fail} 筆。`;

                        // 寄完之後把檔案框清空
                        document.getElementById('imgFile1').value = "";
                        document.getElementById('imgFile2').value = "";
                        document.getElementById('imgFile3').value = "";
                        document.getElementById('imgFile4').value = "";

                        alert('訊息發送任務完成！');
                    })
                    .withFailureHandler(function (err) {
                        btn.disabled = false;
                        btn.innerText = "🚀 立即發送給選定的家長";
                        statusText.style.color = "red";
                        statusText.innerText = "❌ 發生錯誤：" + err.message;
                    })
                    .sendBatchLineMessages(payload, imagesData);

            } catch (err) {
                btn.disabled = false;
                btn.innerText = "🚀 立即發送給選定的家長";
                statusText.style.color = "red";
                statusText.innerText = "❌ 圖片處理錯誤：" + err;
            }
        }
    </script>
</body>

</html>
